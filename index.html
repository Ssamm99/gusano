<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Gusano">
<meta name="theme-color" content="#F5F6FB">
<title>Gusano de constancia</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@400;450;500;600&display=swap');
  :root{
    --bg:#F5F6FB; --card:#FFFFFF; --ink:#191C2B; --muted:#6E7386; --line:#E7E9F2;
    --indigo:#4F46E5; --done:#10B981; --done-soft:#E7F7F0; --amber:#F59E0B; --miss:#EDEFF6;
    --gym:#F97316;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;line-height:1.5;padding:22px 16px calc(34px + env(safe-area-inset-bottom))}
  .wrap{max-width:520px;margin:0 auto}
  .top{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:14px}
  .eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--indigo);font-weight:600}
  h1{font-family:'Fraunces',serif;font-weight:500;font-size:24px;letter-spacing:-.01em;text-transform:capitalize}
  .stats{text-align:right;flex:0 0 auto}
  .stats .big{font-family:'Fraunces',serif;font-size:30px;font-weight:500;line-height:1;font-variant-numeric:tabular-nums;display:inline-block}
  .stats .big.pop{animation:numpop .55s ease-out}
  @keyframes numpop{0%{transform:scale(1)}40%{transform:scale(1.28)}100%{transform:scale(1)}}
  .stats .lbl{font-size:11px;color:var(--muted);margin-top:2px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:22px}
  .spiral{padding:14px 10px 6px;margin-bottom:14px}
  svg{width:100%;height:auto;display:block;touch-action:manipulation}
  .node{cursor:pointer}.node.future{cursor:default}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .todayRing{animation:pulse 1.8s ease-in-out infinite;transform-origin:center}
  @media (prefers-reduced-motion:reduce){.todayRing{animation:none}}
  .month-line{display:flex;justify-content:space-between;align-items:center;padding:0 14px 14px;font-size:12px;color:var(--muted)}
  .legend{display:flex;gap:12px}.legend span{display:inline-flex;align-items:center;gap:5px}
  .sw{width:11px;height:11px;border-radius:50%;display:inline-block}
  .sel{font-size:13px;color:var(--muted);margin:2px 4px 8px;font-weight:500}.sel b{color:var(--ink)}
  .list{display:flex;flex-direction:column;gap:9px}
  .habit{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:13px 15px;
    display:flex;align-items:center;gap:13px;cursor:pointer;transition:.15s;user-select:none}
  .habit:hover{border-color:#CFD3E6}.habit:focus-visible{outline:2px solid var(--indigo);outline-offset:2px}
  .habit.done{background:var(--done-soft);border-color:#BEEAD6}
  .check{width:25px;height:25px;border-radius:8px;border:2px solid #CBD0E2;flex:0 0 auto;display:grid;place-items:center;transition:.15s}
  .habit.done .check{background:var(--done);border-color:var(--done)}
  .check svg{width:14px;height:14px;stroke:#fff;stroke-width:3.2;fill:none;opacity:0;transition:.15s}
  .habit.done .check svg{opacity:1}
  .h-label{font-weight:500;font-size:15px}.habit.done .h-label{color:#0B7A55}
  .h-detail{font-size:12px;color:var(--muted)}.h-rest{font-size:12px;color:var(--muted);font-style:italic}
  .habit.gym{margin-top:5px}
  .habit.gym.done{background:#FEF1E7;border-color:#F9C89B}
  .habit.gym.done .check{background:var(--gym);border-color:var(--gym)}
  .habit.gym.done .h-label{color:#C2560A}
  .dots{display:flex;gap:6px;margin-left:auto}
  .dots i{width:8px;height:8px;border-radius:50%;background:#EDEFF6;display:inline-block}
  .dots i.on{background:var(--gym)}
  .verse{margin-top:26px;text-align:center;padding-top:18px;border-top:1px solid var(--line)}
  .verse .v{font-family:'Fraunces',serif;font-style:italic;font-weight:400;font-size:14px;color:#5A5F72;line-height:1.55;max-width:330px;margin:0 auto}
  .verse .ref{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:#A6ABBD;margin-top:9px}
  /* Confeti de celebración */
  .confetti{position:fixed;inset:0;pointer-events:none;z-index:60;overflow:hidden}
  .confetti i{position:absolute;left:50%;top:36%;width:9px;height:9px;border-radius:2px;opacity:0;
    animation:confpop 1.25s cubic-bezier(.22,.61,.36,1) forwards;animation-delay:var(--d)}
  @keyframes confpop{
    0%{opacity:1;transform:translate(-50%,-50%) rotate(0) scale(1)}
    70%{opacity:1}
    100%{opacity:0;transform:translate(calc(-50% + var(--tx)),calc(-50% + var(--ty) + 130px)) rotate(var(--rot)) scale(.9)}
  }
  @media (prefers-reduced-motion:reduce){.confetti{display:none}.stats .big.pop{animation:none}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div><div class="eyebrow">Gusano de constancia</div><h1 id="month">—</h1></div>
    <div class="stats"><div class="big" id="streak">0</div><div class="lbl">de racha · récord <span id="best">0</span></div></div>
  </div>
  <div class="card spiral">
    <div id="svgbox"></div>
    <div class="month-line">
      <span id="count">0 / 0 días</span>
      <span class="legend">
        <span><i class="sw" style="background:var(--done)"></i>completo</span>
        <span><i class="sw" style="background:#fff;border:2px solid var(--amber)"></i>a medias</span>
        <span><i class="sw" style="background:var(--miss)"></i>vacío</span>
      </span>
    </div>
  </div>
  <div class="sel" id="sel">Marcando: <b>hoy</b></div>
  <div class="list" id="list"></div>
  <div class="verse">
    <p class="v">&ldquo;El que hace bien su trabajo, estará al servicio de reyes y no de gente insignificante.&rdquo;</p>
    <p class="ref">Proverbios 22:29</p>
  </div>
</div>
<script>
const HABITS=[
  {id:'biblia',   label:'Biblia',                   detail:'10 min'},
  {id:'ingles_w', label:'Inglés · writing',         detail:'30 min'},
  {id:'ingles_v', label:'Inglés · video / lectura', detail:'15 min'},
  {id:'piano',    label:'Piano',                    detail:'40 min', restSunday:true},
];
const KEY='routine-log';
let log={}, selKey=null;
const hasStore=(typeof window!=='undefined' && window.storage && typeof window.storage.get==='function');
const store={
  async get(k){ if(hasStore){try{const r=await window.storage.get(k,false);if(r&&r.value)return r.value;}catch(e){}} try{return localStorage.getItem(k);}catch(e){return null;} },
  async set(k,v){ if(hasStore){try{await window.storage.set(k,v,false);}catch(e){}} try{localStorage.setItem(k,v);}catch(e){} }
};
// ---- Fechas: SIEMPRE en hora local (nunca parsear 'YYYY-MM-DD' con new Date) ----
function ymd(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),a=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${a}`;}
function parseKey(k){const p=k.split('-');return new Date(+p[0],(+p[1])-1,+p[2]);} // fuerza hora local
function addDays(d,n){const x=new Date(d);x.setHours(0,0,0,0);x.setDate(x.getDate()+n);return x;}
function today0(){const d=new Date();d.setHours(0,0,0,0);return d;}
function weekStart(d){const x=new Date(d);x.setHours(0,0,0,0);const off=(x.getDay()+6)%7;x.setDate(x.getDate()-off);return x;}
function gymCountWeek(d){const s=weekStart(d);let c=0;for(let i=0;i<7;i++){if((log[ymd(addDays(s,i))]||{}).gym)c++;}return c;}
function requiredFor(d){return HABITS.filter(h=>!(h.restSunday&&d.getDay()===0)).map(h=>h.id);}
function fracOf(d){const rec=log[ymd(d)]||{};const req=requiredFor(d);if(!req.length)return 1;return req.filter(id=>rec[id]).length/req.length;}
function isComplete(d){return fracOf(d)>=1;}
function isFuture(d){return d>today0();}
function currentStreak(){let d=today0();if(!isComplete(d))d=addDays(d,-1);let n=0;while(isComplete(d)){n++;d=addDays(d,-1);}return n;}
function bestStreak(){const ks=Object.keys(log);if(!ks.length)return currentStreak();ks.sort();let d=parseKey(ks[0]);const t=today0();let run=0,best=0;while(d<=t){if(isComplete(d)){run++;best=Math.max(best,run);}else run=0;d=addDays(d,1);}return Math.max(best,currentStreak());}
function monthDays(){const n=new Date(),y=n.getFullYear(),m=n.getMonth();const last=new Date(y,m+1,0).getDate();const a=[];for(let i=1;i<=last;i++)a.push(new Date(y,m,i));return a;}
async function save(){await store.set(KEY,JSON.stringify(log));}
async function load(){try{const raw=await store.get(KEY);if(raw)log=JSON.parse(raw);}catch(e){log={};}}
// ---- Celebración al completar el día ----
function celebrate(){
  if(window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches)return;
  const colors=['#10B981','#4F46E5','#F59E0B','#F97316','#34D399'];
  const box=document.createElement('div');box.className='confetti';
  for(let i=0;i<36;i++){
    const p=document.createElement('i');
    const ang=Math.random()*Math.PI*2, dist=50+Math.random()*170;
    p.style.setProperty('--tx',(Math.cos(ang)*dist).toFixed(0)+'px');
    p.style.setProperty('--ty',(Math.sin(ang)*dist-30).toFixed(0)+'px');
    p.style.setProperty('--rot',(Math.random()*720-360).toFixed(0)+'deg');
    p.style.setProperty('--d',(Math.random()*120).toFixed(0)+'ms');
    p.style.background=colors[i%colors.length];
    box.appendChild(p);
  }
  document.body.appendChild(box);
  setTimeout(()=>box.remove(),1550);
  const s=document.getElementById('streak');s.classList.remove('pop');void s.offsetWidth;s.classList.add('pop');
}
function toggle(id){
  const d=parseKey(selKey);if(isFuture(d))return;
  const wasComplete=isComplete(d);
  const rec=log[selKey]||{};rec[id]=!rec[id];log[selKey]=rec;
  const nowComplete=isComplete(d);
  save();render();
  if(!wasComplete && nowComplete) celebrate();
}
function spiralPoints(N){let theta=0,r=24;const b=6.6,spacing=24,pts=[];for(let i=0;i<N;i++){pts.push([r*Math.cos(theta),r*Math.sin(theta)]);theta+=spacing/Math.max(r,1);r=24+b*theta;}return pts;}
function render(){
  const now=new Date();
  document.getElementById('month').textContent=now.toLocaleDateString('es-MX',{month:'long',year:'numeric'});
  const days=monthDays(),pts=spiralPoints(days.length);
  let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
  pts.forEach(p=>{minX=Math.min(minX,p[0]);minY=Math.min(minY,p[1]);maxX=Math.max(maxX,p[0]);maxY=Math.max(maxY,p[1]);});
  const pad=18,vbX=minX-pad,vbY=minY-pad,vbW=(maxX-minX)+pad*2,vbH=(maxY-minY)+pad*2,tKey=ymd(today0());
  let paths='',greens='',nodes='';
  for(let i=1;i<days.length;i++){const a=pts[i-1],c=pts[i];paths+=`<line x1="${a[0]}" y1="${a[1]}" x2="${c[0]}" y2="${c[1]}" stroke="#E7E9F2" stroke-width="4" stroke-linecap="round"/>`;
    if(isComplete(days[i-1])&&isComplete(days[i]))greens+=`<line x1="${a[0]}" y1="${a[1]}" x2="${c[0]}" y2="${c[1]}" stroke="#10B981" stroke-width="6" stroke-linecap="round"/>`;}
  days.forEach((d,i)=>{
    const p=pts[i],k=ymd(d),f=fracOf(d),fut=isFuture(d),isToday=k===tKey,isSel=k===selKey;
    let fill='#EDEFF6',stroke='#E7E9F2',sw=2;
    if(fut){fill='#FFFFFF';stroke='#EDEFF6';sw=1.5;}else if(f>=1){fill='#10B981';stroke='#10B981';}else if(f>0){fill='#FFFFFF';stroke='#F59E0B';sw=2.5;}
    let extra='';
    if(isToday)extra+=`<circle class="todayRing" cx="${p[0]}" cy="${p[1]}" r="12.5" fill="none" stroke="#4F46E5" stroke-width="2"/>`;
    if(isSel&&!isToday)extra+=`<circle cx="${p[0]}" cy="${p[1]}" r="12.5" fill="none" stroke="#4F46E5" stroke-width="2.5"/>`;
    nodes+=`<g class="node ${fut?'future':''}" ${fut?'':`data-k="${k}"`}>${extra}<circle cx="${p[0]}" cy="${p[1]}" r="8.5" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;
    if(f>0&&f<1&&!fut)nodes+=`<circle cx="${p[0]}" cy="${p[1]}" r="3.4" fill="#10B981"/>`;
    nodes+=`<text x="${p[0]}" y="${p[1]+3}" font-size="8" text-anchor="middle" fill="${f>=1&&!fut?'#fff':'#9AA0B4'}" font-family="Inter" style="pointer-events:none">${d.getDate()}</text></g>`;
  });
  document.getElementById('svgbox').innerHTML=`<svg viewBox="${vbX} ${vbY} ${vbW} ${vbH}" role="img" aria-label="Espiral del mes">${paths}${greens}${nodes}</svg>`;
  document.querySelectorAll('.node[data-k]').forEach(n=>n.addEventListener('click',()=>{selKey=n.getAttribute('data-k');render();}));
  document.getElementById('streak').textContent=currentStreak();
  document.getElementById('best').textContent=bestStreak();
  const doneM=days.filter(d=>!isFuture(d)&&isComplete(d)).length,elapsed=days.filter(d=>!isFuture(d)).length;
  document.getElementById('count').textContent=`${doneM} / ${elapsed} días completos`;
  const selD=parseKey(selKey);
  const selLbl=selKey===tKey?'hoy':selD.toLocaleDateString('es-MX',{weekday:'long',day:'numeric'});
  document.getElementById('sel').innerHTML=`Marcando: <b>${selLbl}</b>`;
  const list=document.getElementById('list');list.innerHTML='';
  const rec=log[selKey]||{},sunday=selD.getDay()===0;
  HABITS.forEach(h=>{
    const rest=h.restSunday&&sunday,done=!!rec[h.id];
    const el=document.createElement('div');el.className='habit'+(done&&!rest?' done':'');
    if(rest){el.style.cursor='default';el.style.opacity='.7';
      el.innerHTML=`<div class="check" style="border-style:dashed;border-color:var(--line)"></div><div><span class="h-label">${h.label}</span> <span class="h-rest">— domingo, descanso 🌱</span></div>`;
    }else{
      el.tabIndex=0;el.setAttribute('role','button');el.setAttribute('aria-pressed',done);
      el.innerHTML=`<div class="check"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></div><div><span class="h-label">${h.label}</span> <span class="h-detail">· ${h.detail}</span></div>`;
      el.addEventListener('click',()=>toggle(h.id));
      el.addEventListener('keydown',e=>{if(e.key===' '||e.key==='Enter'){e.preventDefault();toggle(h.id);}});
    }
    list.appendChild(el);
  });
  const gdone=!!rec.gym, gc=gymCountWeek(selD);
  const gel=document.createElement('div');gel.className='habit gym'+(gdone?' done':'');
  gel.tabIndex=0;gel.setAttribute('role','button');gel.setAttribute('aria-pressed',gdone);
  let ds='';for(let i=0;i<4;i++)ds+=`<i class="${i<gc?'on':''}"></i>`;
  gel.innerHTML=`<div class="check"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></div>`+
    `<div><span class="h-label">Gym</span> <span class="h-detail">· ${gc} / 4 esta semana</span></div><div class="dots">${ds}</div>`;
  gel.addEventListener('click',()=>toggle('gym'));
  gel.addEventListener('keydown',e=>{if(e.key===' '||e.key==='Enter'){e.preventDefault();toggle('gym');}});
  list.appendChild(gel);
}
(async()=>{selKey=ymd(today0());await load();render();})();
</script>
</body>
</html>
